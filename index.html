<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リベ大税理士法人 業務管理システム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ====== ログイン画面 ====== -->
<div id="login-page" class="login-page">
  <div class="login-card">
    <div class="logo">&#x1f3e2;</div>
    <h1>リベ大税理士法人</h1>
    <p class="subtitle">業務管理システム</p>

    <button class="btn-google" onclick="doLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Googleアカウントでログイン
    </button>

    <div class="login-divider"><span>または</span></div>

    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" value="hiro@libetax.jp" placeholder="example@libetax.jp">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" value="password" placeholder="パスワードを入力">
    </div>
    <button class="btn btn-primary btn-lg" onclick="doLogin()">ログイン</button>

    <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--gray-400);">
      @libetax.jp のGoogle Workspaceアカウントでログインできます
    </p>
    <p style="text-align:center;margin-top:8px;font-size:12px;color:var(--gray-400)">UIモック - ダミーデータで動作します</p>
  </div>
</div>

<!-- ====== メインレイアウト ====== -->
<div id="app-layout" class="app-layout" style="display:none">

  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>リベ大税理士法人</h2>
      <div class="org-name">業務管理システム</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">メイン</div>
      <a href="#" data-page="dashboard">&#x1f4ca; ダッシュボード</a>
      <a href="#" data-page="tasks">&#x2705; タスク一覧</a>
      <a href="#" data-page="progress">&#x1f4cb; 進捗管理表</a>

      <div class="nav-section">管理</div>
      <a href="#" data-page="clients">&#x1f465; 顧客一覧</a>
      <a href="#" data-page="staff">&#x1f464; 職員一覧</a>
      <a href="#" data-page="timesheet">&#x23f1; 工数管理</a>
      <a href="#" data-page="reports">&#x1f4dd; 報告書</a>
      <a href="#" data-page="calendar">&#x1f4c5; カレンダー</a>

      <div class="nav-section">報酬</div>
      <a href="#" data-page="rewards">&#x1f4b0; 報酬管理</a>

      <div class="nav-section">設定</div>
      <a href="#" data-page="integrations">&#x1f517; 外部連携</a>
      <a href="#" data-page="settings">&#x2699; マイ設定</a>
    </nav>
    <div class="sidebar-user">
      <div class="avatar">H</div>
      <div class="user-info">
        <div class="name">ひろ</div>
        <div class="role">管理者</div>
      </div>
    </div>
  </aside>

  <!-- メインコンテンツ -->
  <div class="main-content">
    <header class="header">
      <h1 id="header-title">ダッシュボード</h1>
      <div class="header-actions">
        <div class="notification-bell" onclick="navigateTo('dashboard')">
          &#x1f514;
          <span class="badge">3</span>
        </div>
      </div>
    </header>
    <div class="page-content" id="page-content">
      <!-- ページ内容がここに動的挿入される -->
    </div>
  </div>

</div>

<script src="data/mock-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
